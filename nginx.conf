# nginx server block for cesmii.org
#
# Deploy:
#   1. Run `node build.js` (or `npm run build`) to generate the out/ directory.
#   2. Copy/rsync out/ to your server document root (set as `root` below).
#   3. Include this file from your nginx config:
#        include /path/to/this/nginx.conf;
#      or paste the server block into your sites-available config.
#
# Clean URLs work via try_files: a request for /about/our-story
# is served from out/about/our-story/index.html with no redirect.
#
# 404 is handled by out/404.html, which includes the full site chrome
# (nav, header, footer) so it looks like the rest of the site.

server {
    listen 80;
    server_name cesmii.org www.cesmii.org;

    # Path to the built out/ directory on the server.
    # Update this to wherever you deploy the build output.
    root /var/www/cesmii/out;

    index index.html;

    # Clean URLs: try exact file match, then directory index, then 404
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Serve 404.html for any missing page, with a 404 status code
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache static assets aggressively (content-hashed filenames are ideal,
    # but even without hashing a 1-year cache is fine for logo/CSS/JS since
    # a full redeploy refreshes everything)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # Redirect www → apex (optional, remove if you prefer www canonical)
    if ($host = www.cesmii.org) {
        return 301 https://cesmii.org$request_uri;
    }
}

