# nginx server block for cesmii.org
#
# Deploy:
#   1. Run `node build.js` (or `npm run build`) to generate the out/ directory.
#   2. Copy/rsync out/ to your server document root (set as `root` below).
#   3. Include this file from your nginx config:
#        include /path/to/this/nginx.conf;
#      or paste the server block into your sites-available config.
#
# PHP setup (Ubuntu 24.04):
#   sudo apt install php8.3-fpm php8.3-curl php8.3-xml
#   sudo systemctl enable --now php8.3-fpm
#
# HubSpot pages are built as index.php files that include proxy.php server-side.
# All other pages remain static .html files.

server {
    listen 80;
    server_name cesmii.org www.cesmii.org;

    # Path to the built out/ directory on the server.
    root /var/www/cesmii/out;

    # Try index.php before index.html so HubSpot pages are served via PHP-FPM.
    index index.php index.html;

    # Block direct web access to the proxy library — it is an include-only file.
    location = /proxy.php {
        return 404;
    }

    # PHP-FPM for generated HubSpot pages (index.php).
    # Cache-Control: no-store prevents reverse proxies / CDNs from caching
    # PHP responses; we control caching inside proxy.php via the disk cache.
    # Note: nginx add_header does not inherit from outer blocks when a location
    # defines its own add_header directives, so security headers are repeated here.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass            unix:/run/php/php8.3-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout    15;

        add_header Cache-Control          "no-store"                             always;
        add_header X-Content-Type-Options "nosniff"                              always;
        add_header X-Frame-Options        "SAMEORIGIN"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"      always;
    }

    # Clean URLs: try exact file, then directory index, then dynamic handler.
    location / {
        try_files $uri $uri/ @dynamic;
    }

    # Catch-all for database-driven sections (/bio/*, etc.) with no static file.
    # dynamic.php routes by prefix and proxies HubSpot; returns 404 for unknown paths.
    location @dynamic {
        include fastcgi_params;
        fastcgi_pass            unix:/run/php/php8.3-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root/dynamic.php;
        fastcgi_read_timeout    15;
        add_header Cache-Control          "no-store"                             always;
        add_header X-Content-Type-Options "nosniff"                              always;
        add_header X-Frame-Options        "SAMEORIGIN"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"      always;
    }

    # Serve 404.html for static-asset misses (dynamic.php handles page 404s).
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache static assets aggressively.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control          "public, immutable"                    always;
        add_header X-Content-Type-Options "nosniff"                              always;
        add_header X-Frame-Options        "SAMEORIGIN"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"      always;
        access_log off;
    }

    # Security headers for all other responses (plain HTML, 404, etc.).
    add_header X-Content-Type-Options  "nosniff"                               always;
    add_header X-Frame-Options         "SAMEORIGIN"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"       always;

    # Redirect www → apex (remove if you prefer www canonical).
    if ($host = www.cesmii.org) {
        return 301 https://cesmii.org$request_uri;
    }
}

