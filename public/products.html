<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — CESMII</title>
</head>
<body>
  <div class="body-wrapper hs-landing-page hs-page">
    <div id="site-header"></div>

    <main class="body-container-wrapper body-container">
      <!-- Page Header -->
      <div class="row-fluid-wrapper row-depth-1 dnd-section" style="background:rgba(1,1,1,1);padding:5rem 0;">
        <div class="row-fluid">
          <div class="span12 widget-span widget-type-custom_widget dnd-module">
            <div class="content-wrapper">
              <div class="heading" style="max-width:80%;margin:auto;text-align:center;">
                <h1>Products</h1>
                <div class="description" style="text-align:center;">Tools and platforms for Smart Manufacturing</div>
                <div class="separator" style="background:var(--primary_color);"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="row-fluid-wrapper row-depth-1 dnd-section" style="padding:4rem 0;">
        <div class="row-fluid">
          <div class="span12 widget-span widget-type-custom_widget dnd-module">
            <div class="content-wrapper">
              <div id="products-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem;">
                <div class="loading">Loading products...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/hubspot.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
